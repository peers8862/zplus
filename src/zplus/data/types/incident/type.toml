[[type]]
name = "incident"
label = "Incidents"
folder = "incidents"
template = "incident.md"
landing = "Incidents and postmortems — what broke and what we learned. Newest first."
  [[type.section]]
  heading = "What happened"
  shape = "prose"
  prompt = "The incident, plainly."
  [[type.section]]
  heading = "Impact"
  shape = "prose"
  prompt = "Who and what was affected, and how badly."
  [[type.section]]
  heading = "Resolution"
  shape = "list"
  prompt = "Steps taken to mitigate and resolve."
  [[type.section]]
  heading = "Prevention"
  shape = "task"
  prompt = "Changes to stop a recurrence."
  [[type.field]]
  name = "owner"
  type = "owner"
  required = true
  [[type.field]]
  name = "severity"
  type = "enum"
  values = ["low", "medium", "high", "critical"]
  [[type.field]]
  name = "status"
  type = "status"
  values = ["open", "mitigated", "resolved", "postmortem"]
  done = ["resolved", "postmortem"]
  [[type.field]]
  name = "involved"
  type = "ref"
  ref = "system"
  many = true
